<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LIFELINEMETA - Mobile App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:system-ui, sans-serif;
      background:#f0f2f5;
      display:flex;
      justify-content:center;
      padding:20px;
    }
    .phone{
      width:380px;
      height:720px;
      background:#000;
      border-radius:50px;
      padding:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
      overflow:hidden;
    }
    .screen{
      width:100%;
      height:100%;
      background:white;
      border-radius:35px;
      overflow:hidden;
      position:relative;
    }

    /* Top Bar */
    .topbar{
      background:#1e3a8a;
      color:white;
      padding:12px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
    }

    /* Header */
    .app-header{
      padding:20px;
      text-align:center;
      background:linear-gradient(#1e3a8a, #2563eb);
      color:white;
    }
    .app-header img{
      width:80px; height:80px; border-radius:50%; border:3px solid white;
    }
    .app-header h1{font-size:22px; margin-top:8px;}

    /* Balance Card */
    .balance{
      margin:20px;
      background:#1e3a8a;
      color:white;
      border-radius:16px;
      padding:25px;
      text-align:center;
    }
    .balance-amount{font-size:36px; font-weight:800;}

    /* Menu */
    .menu{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:15px;
      padding:0 20px;
    }
    .menu-item{
      background:white;
      padding:18px 10px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }
    .menu-item span{font-size:28px; display:block; margin-bottom:8px;}

    /* Bottom Navigation */
    .bottom-nav{
      position:absolute;
      bottom:0;
      width:100%;
      background:white;
      border-top:1px solid #ddd;
      display:flex;
      justify-content:space-around;
      padding:12px 0;
    }
    .nav-item{
      text-align:center;
      color:#666;
      font-size:12px;
    }
    .nav-item.active{color:#1e3a8a; font-weight:700;}
  </style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <!-- Top Status Bar -->
    <div class="topbar">
      <span>9:41</span>
      <span>5G • 92%</span>
    </div>

    <!-- App Header -->
    <div class="app-header">
      <img src="assets/logo/livelinemeta.png" alt="Logo">
      <h1>LIFELINEMETA</h1>
      <p style="margin-top:5px; opacity:0.9;">Global Crypto Investment</p>
    </div>

    <!-- Balance -->
    <div class="balance">
      <p style="font-size:16px;">Your Balance</p>
      <div class="balance-amount">৳ 48,750.00</div>
      <p style="margin-top:8px; opacity:0.9;">+12.5% this month</p>
    </div>

    <!-- Quick Menu -->
    <div class="menu">
      <div class="menu-item">
        <span>💰</span>
        <div>Invest</div>
      </div>
      <div class="menu-item">
        <span>📊</span>
        <div>Dashboard</div>
      </div>
      <div class="menu-item">
        <span>👥</span>
        <div>Refer</div>
      </div>
      <div class="menu-item">
        <span>💸</span>
        <div>Withdraw</div>
      </div>
      <div class="menu-item">
        <span>🏆</span>
        <div>Rewards</div>
      </div>
      <div class="menu-item">
        <span>🔄</span>
        <div>History</div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <span style="font-size:24px;">🏠</span><br>Home
      </div>
      <div class="nav-item">
        <span style="font-size:24px;">📈</span><br>Invest
      </div>
      <div class="nav-item">
        <span style="font-size:24px;">👥</span><br>Team
      </div>
      <div class="nav-item">
        <span style="font-size:24px;">💰</span><br>Wallet
      </div>
      <div class="nav-item">
        <span style="font-size:24px;">👤</span><br>Profile
      </div>
    </div>

  </div>
</div>

</body>
</html>
